<script>

    // verificar si existe el token

    if(!localStorage.getItem("token")){

        window.location.href="login.html";

    }

</script>


<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Gestión de Productos</title>

    <link rel="stylesheet" href="../css/estilos.css">

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/producto.js"></script>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header text-center">
                <h2>Gestión de Productos</h2>
            </div>


            <div class="card-body">
                <!-- codigo -->
                <div class="mb-3">
                    <label class="form-label">Código</label>
                    <input
                        type="text"
                        id="codigo"
                        class="form-control">
                </div>


                <!-- producto -->
                <div class="mb-3">
                    <label class="form-label">Producto</label>
                    <input
                        type="text"
                        id="producto"
                        class="form-control">
                </div>


                <!-- precio -->
                <div class="mb-3">
                    <label class="form-label">Precio</label>
                    <input
                        type="number"
                        id="precio"
                        class="form-control"
                        min="0"
                        onkeydown="return event.key !== '-'">
                </div>


                <!-- cantidad -->
                <div class="mb-3">
                    <label class="form-label">Cantidad</label>
                    <input
                        type="number"
                        id="cantidad"
                        class="form-control"
                        min="0"
                        onkeydown="return event.key !== '-'">
                </div>



                <!-- botones -->
                <div class="text-center">
                
                    <button class="btn btn-success" onclick="ejecutar('guardar')">
                        Guardar
                    </button>
                    
                    <button class="btn btn-warning" onclick="ejecutar('modificar')">
                        Modificar
                    </button>
                    
                    <button class="btn btn-primary" onclick="ejecutar('buscar')">
                        Buscar
                    </button>

                    <button class="btn btn-danger" onclick="ejecutar('eliminar')">
                        Eliminar
                    </button>

                </div>

                <button class="btn btn-secondary mt-3" onclick="cerrarSesion()">
                    Cerrar sesión
                </button>

            </div>
        </div>
    </div>


</body>
</html>
